name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GamesApi.sln

      - name: Build
        run: dotnet build GamesApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GamesApi.sln --configuration Release --no-build --verbosity normal